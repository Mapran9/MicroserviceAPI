services:
  cart-service:
    ports:
      - "8003:8003"

  order-service:
    ports:
      - "8004:8004"
    environment:
      SERVICE_NAME: order-service
      PORT: "8004"
      DB_DSN: "root:root@tcp(host.docker.internal:3304)/order_service_db?parseTime=true"
      CART_BASE_URL: "http://cart-service:8003"
      PAYMENT_BASE_URL: "http://payment-service:8005"

  payment-service:
    ports:
      - "8005:8005"

  cart-lb:
    profiles: ["disabled"]

  order-lb:
    profiles: ["disabled"]

  payment-lb:
    profiles: ["disabled"]